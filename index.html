<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairyLabs - The Lab is Booting</title>
    <style>
        body {
            background-color: #0d0e15;
            color: #e2e8f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            border: 1px solid #38bdf8;
            border-radius: 12px;
            background: rgba(30, 41, 59, 0.5);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        h1 {
            color: #38bdf8;
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        .status {
            display: inline-block;
            padding: 6px 12px;
            background-color: rgba(34, 197, 94, 0.2);
            border: 1px solid #22c55e;
            color: #4ade80;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 30px;
            animation: blink 2s infinite;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #94a3b8;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            padding: 14px;
            color: #0d0e15;
            background-color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn:hover {
            background-color: #7dd3fc;
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.6);
        }

        .btn-tg {
            background-color: #22d3ee;
        }
        .btn-tg:hover {
            background-color: #67e8f9;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.6);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>FairyLabs</h1>
        <div class="status">▲ SYSTEM: BOOTING_</div>
        
        <p>Welkom in het lab. Wij bouwen aan de toekomst van hardware hacking, custom displays en community-driven tech. Momenteel zijn onze systemen aan het opstarten en bereiden we nieuwe voorraad voor.</p>
        
        <div class="links">
            <a href="https://x.com/fairylabs_tech" target="_blank" class="btn">Volg het lab op X</a>
            <a href="https://t.me/fairylabs_tech" target="_blank" class="btn btn-tg">Ontvang Updates via Telegram</a>
        </div>
    </div>

</body>
</html>
